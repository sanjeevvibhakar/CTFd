services:
  - type: web
    name: ctfd-web
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ctfd-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ctfd-redis
          type: redis
          property: connectionString
      - key: WORKERS
        value: "1"

databases:
  - name: ctfd-db
    plan: free
    user: ctfd
    databaseName: ctfd

services:
  - type: redis
    name: ctfd-redis
    plan: free
    ipAllowList: []
